<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上汽奥迪南区 - 月度项目监控看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #fff; }
        .gradient-text { background: linear-gradient(135deg, #BB0A1E 0%, #ff4d6d 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; }
        .progress-bar { background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 4px; transition: width 0.3s ease; }
        .status-badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; }
        .status-ongoing { background: rgba(99,102,241,0.2); color: #818cf8; }
        .status-done { background: rgba(16,185,129,0.2); color: #34d399; }
        .status-future { background: rgba(156,163,175,0.2); color: #9ca3af; }
        .status-over { background: rgba(249,115,22,0.2); color: #fb923c; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: rgba(187,10,30,0.1); color: #ff6b7a; padding: 12px; text-align: left; font-weight: 600; }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        tr:hover { background: rgba(255,255,255,0.02); }
        .tfoot-total { background: #1a1a2e; font-weight: 600; position: sticky; bottom: 0; }
        .tfoot-total td { border-top: 2px solid #BB0A1E; padding: 12px; }
        .filter-select { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 8px 12px; border-radius: 6px; }
        .kpi-card { background: linear-gradient(135deg, rgba(187,10,30,0.1) 0%, rgba(187,10,30,0.05) 100%); border: 1px solid rgba(187,10,30,0.2); }
    </style>
</head>
<body class="min-h-screen p-6">
    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold gradient-text mb-2">上汽奥迪南区</h1>
            <p class="text-gray-400">月度项目监控看板</p>
            <p class="text-sm text-gray-500 mt-1">数据更新时间: 2025-05-27</p>
        </div>

        <!-- KPI Cards -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="card kpi-card p-4">
                <p class="text-gray-400 text-sm">项目总数</p>
                <p class="text-2xl font-bold text-white">26</p>
                <p class="text-xs text-gray-500">单店16 + 联合10</p>
            </div>
            <div class="card kpi-card p-4">
                <p class="text-gray-400 text-sm">潜客完成率</p>
                <p class="text-2xl font-bold text-red-400">54.4%</p>
                <p class="text-xs text-gray-500">2816 / 5172</p>
            </div>
            <div class="card kpi-card p-4">
                <p class="text-gray-400 text-sm">订单完成率</p>
                <p class="text-2xl font-bold text-red-400">47.1%</p>
                <p class="text-xs text-gray-500">527 / 1118</p>
            </div>
            <div class="card kpi-card p-4">
                <p class="text-gray-400 text-sm">总预算</p>
                <p class="text-2xl font-bold text-white">¥213.2万</p>
                <p class="text-xs text-gray-500">已立项: ¥115.3万</p>
            </div>
        </div>

        <!-- Filters -->
        <div class="card p-4 mb-4">
            <div class="flex flex-wrap gap-3">
                <select class="filter-select" id="filterType" onchange="applyFilters()">
                    <option value="all">全部类型</option>
                    <option value="单店活动">单店活动</option>
                    <option value="联合活动">联合活动</option>
                </select>
                <select class="filter-select" id="filterCity" onchange="applyFilters()">
                    <option value="all">全部城市</option>
                </select>
                <select class="filter-select" id="filterStatus" onchange="applyFilters()">
                    <option value="all">全部状态</option>
                    <option value="进行中">进行中</option>
                    <option value="未开始">未开始</option>
                    <option value="已结束">已结束</option>
                </select>
                <input type="text" id="searchInput" placeholder="搜索活动名称..." class="filter-select flex-1 min-w-[200px]" oninput="applyFilters()">
            </div>
        </div>

        <!-- Table -->
        <div class="card overflow-hidden">
            <div class="overflow-x-auto max-h-[600px] overflow-y-auto">
                <table>
                    <thead class="sticky top-0 z-10">
                        <tr>
                            <th>活动编号</th>
                            <th>活动名称</th>
                            <th>类型</th>
                            <th>城市</th>
                            <th>状态</th>
                            <th>潜客进度</th>
                            <th>订单进度</th>
                            <th>预算</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- Data will be loaded here -->
                    </tbody>
                    <tfoot id="tableFooter" class="tfoot-total">
                        <tr>
                            <td colspan="5" class="text-gray-400">筛选合计</td>
                            <td id="totalQianke">-</td>
                            <td id="totalOrder">-</td>
                            <td id="totalBudget">-</td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Sample data - Replace with your actual data
        const projects = [
            {code: "SAR250501", name: "五一展厅活动", type: "单店活动", city: "广州", status: "进行中", qianke: {actual: 245, target: 300}, order: {actual: 18, target: 25}, budget: 8.5},
            {code: "SAR250502", name: "母亲节主题活动", type: "单店活动", city: "深圳", status: "未开始", qianke: {actual: 0, target: 200}, order: {actual: 0, target: 15}, budget: 6.0},
            {code: "SAR250503", name: "520浪漫购车节", type: "联合活动", city: "上海", status: "进行中", qianke: {actual: 520, target: 800}, order: {actual: 45, target: 60}, budget: 25.0},
            {code: "SAR250504", name: "端午品鉴会", type: "单店活动", city: "杭州", status: "未开始", qianke: {actual: 0, target: 150}, order: {actual: 0, target: 12}, budget: 5.5},
            {code: "SAR250505", name: "618年中大促", type: "联合活动", city: "北京", status: "进行中", qianke: {actual: 890, target: 1200}, order: {actual: 78, target: 100}, budget: 45.0},
        ];

        const cities = [...new Set(projects.map(p => p.city))];
        const citySelect = document.getElementById('filterCity');
        cities.forEach(city => {
            const option = document.createElement('option');
            option.value = city;
            option.textContent = city;
            citySelect.appendChild(option);
        });

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = data.map(p => {
                const qiankeRate = p.qianke.target > 0 ? (p.qianke.actual / p.qianke.target * 100).toFixed(1) : 0;
                const orderRate = p.order.target > 0 ? (p.order.actual / p.order.target * 100).toFixed(1) : 0;
                const statusClass = p.status === '进行中' ? 'status-ongoing' : p.status === '未开始' ? 'status-future' : 'status-done';
                
                return `
                    <tr data-type="${p.type}" data-city="${p.city}" data-status="${p.status}">
                        <td class="font-mono text-gray-400">${p.code}</td>
                        <td class="font-medium">${p.name}</td>
                        <td><span class="text-xs px-2 py-1 rounded bg-gray-800">${p.type}</span></td>
                        <td>${p.city}</td>
                        <td><span class="status-badge ${statusClass}">${p.status}</span></td>
                        <td>
                            <div class="flex items-center gap-2">
                                <div class="progress-bar w-20 h-2">
                                    <div class="progress-fill ${qiankeRate >= 100 ? 'bg-green-500' : 'bg-red-500'}" style="width: ${Math.min(qiankeRate, 100)}%"></div>
                                </div>
                                <span class="text-xs">${p.qianke.actual}/${p.qianke.target}</span>
                            </div>
                        </td>
                        <td>
                            <div class="flex items-center gap-2">
                                <div class="progress-bar w-20 h-2">
                                    <div class="progress-fill ${orderRate >= 100 ? 'bg-green-500' : 'bg-red-500'}" style="width: ${Math.min(orderRate, 100)}%"></div>
                                </div>
                                <span class="text-xs">${p.order.actual}/${p.order.target}</span>
                            </div>
                        </td>
                        <td class="text-gray-400">¥${p.budget}万</td>
                    </tr>
                `;
            }).join('');
            
            updateTotals(data);
        }

        function updateTotals(data) {
            const totalQiankeActual = data.reduce((sum, p) => sum + p.qianke.actual, 0);
            const totalQiankeTarget = data.reduce((sum, p) => sum + p.qianke.target, 0);
            const totalOrderActual = data.reduce((sum, p) => sum + p.order.actual, 0);
            const totalOrderTarget = data.reduce((sum, p) => sum + p.order.target, 0);
            const totalBudget = data.reduce((sum, p) => sum + p.budget, 0);
            
            document.getElementById('totalQianke').textContent = `${totalQiankeActual}/${totalQiankeTarget}`;
            document.getElementById('totalOrder').textContent = `${totalOrderActual}/${totalOrderTarget}`;
            document.getElementById('totalBudget').textContent = `¥${totalBudget.toFixed(1)}万`;
        }

        function applyFilters() {
            const type = document.getElementById('filterType').value;
            const city = document.getElementById('filterCity').value;
            const status = document.getElementById('filterStatus').value;
            const search = document.getElementById('searchInput').value.toLowerCase();
            
            const filtered = projects.filter(p => {
                if (type !== 'all' && p.type !== type) return false;
                if (city !== 'all' && p.city !== city) return false;
                if (status !== 'all' && p.status !== status) return false;
                if (search && !p.name.toLowerCase().includes(search) && !p.code.toLowerCase().includes(search)) return false;
                return true;
            });
            
            renderTable(filtered);
        }

        // Initial render
        renderTable(projects);
    </script>
</body>
</html>
